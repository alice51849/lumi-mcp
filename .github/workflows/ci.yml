name: Validate MCP bundle

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test server and catalog
        run: npm test
      - name: Validate MCPB manifest
        run: npm run validate
      - name: Pack and inspect MCPB
        run: |
          npm run pack:mcpb
          first="$(sha256sum dist/lumi-app-finder.mcpb | cut -d' ' -f1)"
          npm run pack:mcpb
          second="$(sha256sum dist/lumi-app-finder.mcpb | cut -d' ' -f1)"
          test "$first" = "$second"
          node scripts/set-server-hash.mjs \
            dist/lumi-app-finder.mcpb server.json
          git diff --exit-code -- server.json
          npx mcpb info dist/lumi-app-finder.mcpb
          version="$(node -p "require('./package.json').version")"
          npm pack --pack-destination dist >/dev/null
          mv "dist/lumi-app-finder-mcp-${version}.tgz" \
            dist/lumi-app-finder-npx.tgz
          first_npx="$(sha256sum dist/lumi-app-finder-npx.tgz | cut -d' ' -f1)"
          rm dist/lumi-app-finder-npx.tgz
          npm pack --pack-destination dist >/dev/null
          mv "dist/lumi-app-finder-mcp-${version}.tgz" \
            dist/lumi-app-finder-npx.tgz
          second_npx="$(sha256sum dist/lumi-app-finder-npx.tgz | cut -d' ' -f1)"
          test "$first_npx" = "$second_npx"
          request='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"npx-probe","version":"1.0.0"}}}'
          response="$(printf '%s\n' "$request" | npx --yes ./dist/lumi-app-finder-npx.tgz)"
          node -e '
            const result = JSON.parse(process.argv[1]).result;
            if (result?.serverInfo?.version !== process.argv[2]) process.exit(1);
          ' "$response" "$version"
