name: Publish MCP Registry release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Test and validate
        run: |
          npm test
          npm run validate
      - name: Build release bundle
        run: |
          npm run pack:mcpb
          node scripts/set-server-hash.mjs \
            dist/lumi-app-finder.mcpb \
            server.json \
            "${GITHUB_REF_NAME#v}"
          version="${GITHUB_REF_NAME#v}"
          npm pack --pack-destination dist >/dev/null
          mv "dist/lumi-app-finder-mcp-${version}.tgz" \
            dist/lumi-app-finder-npx.tgz
          request='{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"npx-probe","version":"1.0.0"}}}'
          response="$(printf '%s\n' "$request" | npx --yes ./dist/lumi-app-finder-npx.tgz)"
          node -e '
            const result = JSON.parse(process.argv[1]).result;
            if (result?.serverInfo?.version !== process.argv[2]) process.exit(1);
          ' "$response" "$version"
          (
            cd dist
            sha256sum lumi-app-finder.mcpb lumi-app-finder-npx.tgz \
              > SHA256SUMS
          )
      - name: Publish GitHub release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/lumi-app-finder.mcpb \
              dist/lumi-app-finder-npx.tgz \
              dist/SHA256SUMS \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/lumi-app-finder.mcpb \
              dist/lumi-app-finder-npx.tgz \
              dist/SHA256SUMS \
              --title "Lumi App Finder $GITHUB_REF_NAME" \
              --notes "First-party AI app discovery for 28 verified iOS apps across all 50 Apple locales. Includes direct App Store links, MCP Apps cards, and version-pinned VS Code and Cursor installers."
          fi
      - name: Install MCP Registry publisher
        run: |
          set -euo pipefail
          version=1.8.0
          base="https://github.com/modelcontextprotocol/registry/releases/download/v${version}"
          curl --fail --location --retry 4 --retry-all-errors \
            --output mcp-publisher_linux_amd64.tar.gz \
            "${base}/mcp-publisher_linux_amd64.tar.gz"
          curl --fail --location --retry 4 --retry-all-errors \
            --output checksums.txt \
            "${base}/registry_${version}_checksums.txt"
          grep '  mcp-publisher_linux_amd64.tar.gz$' checksums.txt \
            > mcp-publisher.sha256
          sha256sum --check mcp-publisher.sha256
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher
          chmod +x mcp-publisher
      - name: Authenticate with GitHub OIDC
        run: ./mcp-publisher login github-oidc
      - name: Publish to the official MCP Registry
        run: |
          for attempt in 1 2 3 4; do
            if ./mcp-publisher publish; then
              exit 0
            fi
            if test "$attempt" -eq 4; then
              exit 1
            fi
            sleep $((attempt * 15))
          done
